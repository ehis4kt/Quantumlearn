<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen p-6">

    <h1 class="text-3xl font-bold text-center text-green-400 mb-8">
        Student Leaderboard
    </h1>

    <div class="overflow-x-auto bg-slate-800 rounded-2xl p-6">

        <table class="w-full text-fixed"

            <thead>
                <tr class="border-b border-slate-600">
                    <th class="w-1/6 py-4 text-center">Rank</th>
                    <th class="w-2/6 py-4 text-center">Name</th>
                    <th class="w-1/6 py-4 text-center">Score</th>
                    <th class="w-2/6 py-4 text-center">Level</th>
                </tr>
            </thead>

            <tbody id="leaderboardBody">
            </tbody>

        </table>

    </div>

    <script type="module" src="firebase.js"></script>
<script src="script.js"></script>

<script>
    window.onload = () => {

        if (window.loadLeaderboard) {

            window.loadLeaderboard();
        }
    };
</script>
    
</body>
</html>
