<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center text-white">
    <h1 class="absolute top-10 text-4xl font-bold text-green-400">
        QuantumLearn
    </h1>

    <div class="bg-slate-800 p-8 rounded-2xl shadow-lg w-96">

        <h1 class="text-3xl font-bold text-center mb-6 ">
            Student Login
        </h1>

        <form>

            <div class="mb-4">
                <label class="block mb-2">Email</label>

                <input id="loginEmail" type="email" placeholder="Enter your email"
                    class="w-full p-3 rounded-lg bg-slate-700 outline-none">
            </div>

            <div class="mb-6">
                <label class="block mb-2">Password</label>

                <input id="loginPassword" type="password" placeholder="Enter your password"
                    class="w-full p-3 rounded-lg bg-slate-700 outline-none">
            </div>

            <button type="button" onclick="loginUser()"
                class="w-full bg-green-500 hover:bg-green-600 py-3 rounded-lg font-semibold">
                Login
            </button>

        </form>

        <p class="text-center mt-6 text-slate-400">
            Don't have an account?
            <a href="register.html" class="text-green-400 hover:underline">
                Register
            </a>
        </p>

    </div>

    <script type="module" src="script.js"></script>

</body>

</html>
